<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Serenity Spa — 線上預約</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:   #fdf6ee;
    --warm:    #f5e6d3;
    --blush:   #f2c4c4;
    --rose:    #e8a0a0;
    --mauve:   #c97d7d;
    --brown:   #7a4f3a;
    --text:    #4a3428;
    --muted:   #9c7b6e;
    --white:   #fffcf8;
    --shadow:  rgba(122,79,58,0.12);
    --green:   #7dba6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(242,196,196,0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(245,230,211,0.4) 0%, transparent 50%),
      radial-gradient(circle at 60% 10%, rgba(253,246,238,0.5) 0%, transparent 40%);
    pointer-events: none;
  }

  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 2rem 1.5rem 1.2rem;
    background: linear-gradient(180deg, var(--warm) 0%, transparent 100%);
  }

  .logo-wrap { display: inline-flex; flex-direction: column; align-items: center; gap: 0.3rem; }
  .logo-icon { font-size: 2rem; line-height: 1; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .logo-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 500; color: var(--brown); }
  .logo-sub  { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; }

  .deco-line {
    margin-top: 0.8rem;
    font-size: 0.7rem; color: var(--rose); letter-spacing: 0.3em;
  }

  .main { position: relative; z-index: 5; max-width: 480px; margin: 0 auto; padding: 0 1.2rem 3rem; }

  .section-title { text-align: center; font-size: 1.1rem; margin: 1.5rem 0 1rem; color: var(--brown); }

  /* ── 服務卡片 ── */
  .service-card {
    background: var(--white);
    border-radius: 16px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 16px var(--shadow);
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.5s ease both;
  }
  .service-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px var(--shadow); }
  .service-card.selected { border: 2px solid var(--rose); }

  .service-img { font-size: 2.5rem; text-align: center; margin-bottom: 0.6rem; }
  .service-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.3rem; }
  .service-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
  .service-meta { display: flex; justify-content: space-between; align-items: center; }
  .service-price { font-size: 1.1rem; color: var(--mauve); font-weight: 600; }
  .duration-badge {
    background: var(--warm);
    color: var(--brown);
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
  }

  /* ── 日期 + 時段 ── */
  .date-picker-wrap {
    background: var(--white);
    border-radius: 16px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 16px var(--shadow);
    animation: fadeUp 0.5s ease both;
  }
  .date-picker-wrap label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--brown); }
  .date-picker-wrap input[type="date"] {
    width: 100%;
    padding: 0.6rem;
    border: 1px solid var(--warm);
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--cream);
  }

  .time-slots-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
    margin-top: 0.8rem;
  }
  .time-slot-btn {
    padding: 0.6rem 0.3rem;
    border: 1px solid var(--warm);
    border-radius: 10px;
    background: var(--cream);
    font-family: inherit;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
  }
  .time-slot-btn:hover { background: var(--blush); }
  .time-slot-btn.selected { background: var(--rose); color: white; border-color: var(--rose); }
  .time-slot-btn .remaining { display: block; font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; }
  .time-slot-btn.selected .remaining { color: rgba(255,255,255,0.8); }

  /* ── 預約摘要 ── */
  .booking-summary {
    background: var(--white);
    border-radius: 16px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 16px var(--shadow);
    animation: fadeUp 0.5s ease both;
  }
  .summary-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.6rem; color: var(--brown); }
  .summary-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.3rem; }
  .summary-total { border-top: 1px solid var(--warm); padding-top: 0.5rem; margin-top: 0.5rem; font-weight: 600; color: var(--mauve); }

  /* ── 表單 ── */
  .form-section {
    background: var(--white);
    border-radius: 16px;
    padding: 1.2rem;
    box-shadow: 0 4px 16px var(--shadow);
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s ease both;
  }
  .form-section label { display: block; font-size: 0.8rem; margin-bottom: 0.3rem; color: var(--brown); }
  .form-section input, .form-section textarea {
    width: 100%;
    padding: 0.55rem 0.7rem;
    border: 1px solid var(--warm);
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.85rem;
    color: var(--text);
    background: var(--cream);
    margin-bottom: 0.8rem;
    outline: none;
    transition: border-color 0.3s;
  }
  .form-section input:focus, .form-section textarea:focus { border-color: var(--rose); }
  .form-section textarea { height: 70px; resize: vertical; }

  /* ── Email 驗證 ── */
  .verify-section {
    background: var(--white);
    border-radius: 16px;
    padding: 1.2rem;
    box-shadow: 0 4px 16px var(--shadow);
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
  }
  .verify-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
  .verify-row input { flex: 1; }
  .verify-btn {
    padding: 0.55rem 0.8rem;
    border: none;
    border-radius: 10px;
    background: var(--rose);
    color: white;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.3s;
  }
  .verify-btn:hover { background: var(--mauve); }
  .verify-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .verify-status { font-size: 0.75rem; margin-top: 0.3rem; }

  /* ── 送出按鈕 ── */
  .submit-btn {
    width: 100%;
    padding: 0.8rem;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: white;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.3s;
    letter-spacing: 0.05em;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 成功畫面 ── */
  .success-screen {
    display: none;
    position: relative; z-index: 5;
    max-width: 480px; margin: 0 auto; padding: 3rem 1.5rem;
    text-align: center;
  }
  .success-icon { font-size: 3rem; animation: pop 0.6s ease; }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--brown); margin: 0.8rem 0 0.5rem; }
  .success-msg { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.2rem; }
  .success-badge {
    display: inline-block;
    background: var(--warm);
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    font-size: 0.85rem;
    color: var(--brown);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }
  .new-order-btn {
    padding: 0.7rem 2rem;
    border: 2px solid var(--rose);
    border-radius: 14px;
    background: transparent;
    color: var(--rose);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .new-order-btn:hover { background: var(--rose); color: white; }

  /* ── Loading / Error ── */
  .loading-wrap { text-align: center; padding: 2rem; }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--warm); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #fce4e4; color: #7a3a3a; padding: 0.6rem 1rem; border-radius: 10px; font-size: 0.8rem; margin-bottom: 1rem; text-align: center; }

  .hidden { display: none !important; }

  footer {
    position: relative; z-index: 5;
    text-align: center; padding: 1.5rem;
    font-size: 0.7rem; color: var(--muted);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">💆</div>
    <div class="logo-name">Serenity Spa</div>
    <div class="logo-sub">RELAXATION &amp; WELLNESS</div>
  </div>
  <div class="deco-line">✦ 寧靜與舒適 ✦</div>
</header>

<!-- ── 主頁面 ── -->
<div class="main" id="shop-view">
  <h2 class="section-title">💆 服務項目</h2>
  <div id="services-container">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <!-- 日期 + 時段選擇 -->
  <div id="date-time-section" class="hidden">
    <div class="date-picker-wrap">
      <label>📅 選擇預約日期</label>
      <input type="date" id="booking-date" />
      <div id="timeslots-container" class="hidden">
        <label style="margin-top:0.8rem;">⏰ 選擇時段</label>
        <div class="time-slots-grid" id="timeslots-grid"></div>
      </div>
    </div>
  </div>

  <!-- 預約摘要 -->
  <div id="booking-summary" class="booking-summary hidden">
    <div class="summary-title">📋 預約摘要</div>
    <div class="summary-row"><span>服務</span><span id="sum-service"></span></div>
    <div class="summary-row"><span>時長</span><span id="sum-duration"></span></div>
    <div class="summary-row"><span>日期</span><span id="sum-date"></span></div>
    <div class="summary-row"><span>時段</span><span id="sum-time"></span></div>
    <div class="summary-row summary-total"><span>金額</span><span id="sum-price"></span></div>
  </div>

  <!-- Email 驗證 -->
  <div id="verify-section" class="verify-section hidden">
    <label>📧 Email 驗證</label>
    <div class="verify-row">
      <input type="email" id="email" placeholder="your@email.com" />
      <button class="verify-btn" id="send-code-btn" onclick="sendCode()">發送驗證碼</button>
    </div>
    <div id="code-row" class="verify-row hidden">
      <input type="text" id="verify-code" placeholder="輸入 6 位驗證碼" maxlength="6" />
      <button class="verify-btn" id="verify-btn" onclick="verifyEmail()">驗證</button>
    </div>
    <div class="verify-status" id="verify-status"></div>
  </div>

  <!-- 表單 -->
  <div id="form-section" class="form-section hidden">
    <label>姓名</label>
    <input type="text" id="name" placeholder="您的姓名" />
    <label>電話</label>
    <input type="tel" id="phone" placeholder="0912-345-678" />
    <label>備註（選填）</label>
    <textarea id="note" placeholder="有什麼需要特別注意的嗎？"></textarea>
    <button class="submit-btn" id="submit-btn" onclick="submitBooking()">📋 確認送出預約</button>
  </div>

  <div id="error-msg" class="error-msg hidden"></div>
</div>

<!-- ── 成功畫面 ── -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">🎉</div>
  <h2 class="success-title">預約已送出！</h2>
  <p class="success-msg">謝謝您的預約，我們會盡快與您確認時段 💆</p>
  <div class="success-badge" id="success-id"></div>
  <br/>
  <button class="new-order-btn" onclick="resetPage()">再次預約</button>
</div>

<footer>Serenity Spa Sample — Powered by One Page Go</footer>

<script>
// ── 設定你的 Apps Script 網址 ──────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbxXHqT4oC4ko6IVOu2tOVIsNoeSf0S_YLOnUZGE00XZ_ZQULplziLIAeITqFf5DBU4gHQ/exec";

const SPA_EMOJI = ["💆","🧖","🌿","🕯️","🌸"];

let services = [];
let selectedService = null;
let selectedDate = '';
let selectedTime = '';
let emailVerified = false;
let verifiedEmail = '';

// ── 載入服務 ──────────────────────────────────────────
async function loadServices() {
  try {
    const res  = await fetch(`${API_URL}?action=getServices`);
    const text = await res.text();
    const data = JSON.parse(text);
    services = data.services || [];
    renderServices();
  } catch (err) {
    document.getElementById('services-container').innerHTML =
      '<div class="loading-wrap">目前暫無服務，請稍後再來</div>';
  }
}

function renderServices() {
  const container = document.getElementById('services-container');
  if (!services.length) {
    container.innerHTML = '<div class="loading-wrap">目前暫無服務，請稍後再來</div>';
    return;
  }
  container.innerHTML = services.map((s, i) => {
    const emoji = SPA_EMOJI[i % SPA_EMOJI.length];
    const imgHtml = s.image_url
      ? `<img src="${s.image_url}" alt="${s.name}" style="width:100%;border-radius:10px;" />`
      : emoji;
    return `
      <div class="service-card" id="svc-${s.id}" onclick="selectService('${s.id}')" style="animation-delay:${i*0.08}s">
        <div class="service-img">${imgHtml}</div>
        <div class="service-name">${s.name}</div>
        <div class="service-desc">${s.description || ''}</div>
        <div class="service-meta">
          <span class="service-price">$${s.price}</span>
          <span class="duration-badge">${s.duration_min} 分鐘</span>
        </div>
      </div>`;
  }).join('');
}

// ── 選擇服務 ──────────────────────────────────────────
function selectService(id) {
  selectedService = services.find(s => String(s.id) === String(id));
  if (!selectedService) return;

  // 標記選中
  document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('svc-' + id).classList.add('selected');

  // 顯示日期選擇
  document.getElementById('date-time-section').classList.remove('hidden');
  document.getElementById('timeslots-container').classList.add('hidden');
  document.getElementById('booking-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 設定日期最小值
  const dateInput = document.getElementById('booking-date');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.value = '';
  selectedDate = '';
  selectedTime = '';

  dateInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── 日期變更 → 載入時段 ──────────────────────────────
document.getElementById('booking-date').addEventListener('change', async function() {
  selectedDate = this.value;
  selectedTime = '';
  if (!selectedDate) return;

  const container = document.getElementById('timeslots-container');
  const grid = document.getElementById('timeslots-grid');
  container.classList.remove('hidden');
  grid.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  try {
    const res  = await fetch(`${API_URL}?action=getTimeSlots&date=${selectedDate}`, { redirect: 'follow' });
    const text = await res.text();
    const data = JSON.parse(text);
    const slots = data.slots || [];

    if (!slots.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:0.85rem;padding:1rem;">此日期暫無可預約時段</div>';
      return;
    }

    grid.innerHTML = slots.map(s => `
      <button class="time-slot-btn" onclick="selectTimeSlot('${s.time_slot}')">
        ${s.time_slot}
        <span class="remaining">剩 ${s.remaining} 位</span>
      </button>
    `).join('');
  } catch (err) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#7a3a3a;font-size:0.8rem;">載入時段失敗</div>';
  }
});

// ── 選擇時段 ──────────────────────────────────────────
function selectTimeSlot(time) {
  selectedTime = time;

  document.querySelectorAll('.time-slot-btn').forEach(b => b.classList.remove('selected'));
  event.target.closest('.time-slot-btn').classList.add('selected');

  // 顯示預約摘要
  document.getElementById('sum-service').textContent = selectedService.name;
  document.getElementById('sum-duration').textContent = selectedService.duration_min + ' 分鐘';
  document.getElementById('sum-date').textContent = selectedDate;
  document.getElementById('sum-time').textContent = selectedTime;
  document.getElementById('sum-price').textContent = '$' + selectedService.price;

  document.getElementById('booking-summary').classList.remove('hidden');
  document.getElementById('verify-section').classList.remove('hidden');

  if (emailVerified) {
    document.getElementById('form-section').classList.remove('hidden');
  }
}

// ── Email 驗證 ────────────────────────────────────────
async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('請輸入 Email'); return; }

  const btn = document.getElementById('send-code-btn');
  btn.disabled = true;
  btn.textContent = '發送中…';
  hideError();

  try {
    // 先檢查會員狀態
    const checkRes = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'checkMember', email })
    });
    const checkData = JSON.parse(await checkRes.text());

    if (checkData.blocked) { showError('此 Email 已被停用，請聯繫店家'); btn.disabled = false; btn.textContent = '發送驗證碼'; return; }
    if (checkData.hasActiveOrder) { showError('您有未完成的預約，完成後才能再次預約'); btn.disabled = false; btn.textContent = '發送驗證碼'; return; }

    // 發送驗證碼
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'sendVerifyCode', email })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('code-row').classList.remove('hidden');
      document.getElementById('verify-status').textContent = '驗證碼已寄出，請查看信箱';
      document.getElementById('verify-status').style.color = 'var(--green)';
      // 60 秒倒數
      let sec = 60;
      btn.textContent = `${sec}s`;
      const timer = setInterval(() => {
        sec--;
        btn.textContent = `${sec}s`;
        if (sec <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '重新發送'; }
      }, 1000);
    } else {
      showError(data.error || '發送失敗');
      btn.disabled = false;
      btn.textContent = '發送驗證碼';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '發送驗證碼';
  }
}

async function verifyEmail() {
  const email = document.getElementById('email').value.trim();
  const code  = document.getElementById('verify-code').value.trim();
  if (!code) { showError('請輸入驗證碼'); return; }

  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.textContent = '驗證中…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'verifyCode', email, code })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      emailVerified = true;
      verifiedEmail = email;
      showVerified();
    } else {
      showError(data.error || '驗證失敗');
      btn.disabled = false;
      btn.textContent = '驗證';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '驗證';
  }
}

function showVerified() {
  document.getElementById('verify-status').textContent = '✅ 驗證成功';
  document.getElementById('verify-status').style.color = 'var(--green)';
  document.getElementById('email').disabled = true;
  document.getElementById('verify-code').disabled = true;
  document.getElementById('verify-btn').disabled = true;
  document.getElementById('verify-btn').textContent = '已驗證';
  document.getElementById('send-code-btn').classList.add('hidden');
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('form-section').classList.remove('hidden');
}

// ── 送出預約 ──────────────────────────────────────────
async function submitBooking() {
  const name  = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const note  = document.getElementById('note').value.trim();

  hideError();
  if (!name)  { showError('請輸入姓名'); return; }
  if (!phone) { showError('請輸入電話'); return; }
  const phoneClean = phone.replace(/[-\s]/g, '');
  if (!/^09\d{8}$/.test(phoneClean)) { showError('請輸入有效的手機號碼（09 開頭，共 10 碼）'); return; }
  if (!selectedService || !selectedDate || !selectedTime) { showError('請完成服務、日期、時段選擇'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'submitBooking',
        email: verifiedEmail,
        name,
        phone,
        service_id: String(selectedService.id),
        booking_date: selectedDate,
        booking_time: selectedTime,
        note
      })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('shop-view').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      document.getElementById('success-id').textContent = '預約編號：' + data.bookingId;
    } else {
      showError(data.error || '預約失敗');
      btn.disabled = false;
      btn.textContent = '📋 確認送出預約';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '📋 確認送出預約';
  }
}

// ── 重置 ──────────────────────────────────────────────
function resetPage() {
  selectedService = null;
  selectedDate = '';
  selectedTime = '';
  emailVerified = false;
  verifiedEmail = '';

  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('shop-view').style.display = 'block';

  document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('date-time-section').classList.add('hidden');
  document.getElementById('booking-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 重建驗證區
  document.getElementById('email').disabled = false;
  document.getElementById('email').value = '';
  document.getElementById('verify-code').disabled = false;
  document.getElementById('verify-code').value = '';
  document.getElementById('send-code-btn').classList.remove('hidden');
  document.getElementById('send-code-btn').disabled = false;
  document.getElementById('send-code-btn').textContent = '發送驗證碼';
  document.getElementById('verify-btn').disabled = false;
  document.getElementById('verify-btn').textContent = '驗證';
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('verify-status').textContent = '';

  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('note').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '📋 確認送出預約';
  document.getElementById('booking-date').value = '';

  hideError();
  renderServices();
}

// ── 工具 ──────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-msg').classList.add('hidden');
}

// ── 啟動 ──────────────────────────────────────────────
loadServices();
</script>
</body>
</html>
