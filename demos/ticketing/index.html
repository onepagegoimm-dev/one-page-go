<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">🎪</div>
    <div class="logo-name">Starlight Festival</div>
    <div class="logo-sub">MUSIC &amp; ARTS FESTIVAL</div>
  </div>
  <div class="deco-line">✦ 星光璀璨 ✦</div>
</header>

<!-- ── 主頁面 ── -->
<div class="main" id="shop-view">
  <h2 class="section-title">🎪 活動列表</h2>
  <div id="events-container">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <!-- 票種選擇 -->
  <div id="ticket-section" class="ticket-section hidden">
    <label>🎫 選擇票種</label>
    <div id="ticket-types-container">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- 數量選擇 -->
  <div id="qty-section" class="qty-section hidden">
    <label>📦 選擇數量</label>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-display" id="qty-display">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="qty-hint" id="qty-hint"></div>
  </div>

  <!-- 訂單摘要 -->
  <div id="order-summary" class="order-summary hidden">
    <div class="summary-title">📋 訂單摘要</div>
    <div class="summary-row"><span>活動</span><span id="sum-event"></span></div>
    <div class="summary-row"><span>票種</span><span id="sum-ticket"></span></div>
    <div class="summary-row"><span>單價</span><span id="sum-price"></span></div>
    <div class="summary-row"><span>數量</span><span id="sum-qty"></span></div>
    <div class="summary-row summary-total"><span>合計</span><span id="sum-total"></span></div>
  </div>

  <!-- Email 驗證 -->
  <div id="verify-section" class="verify-section hidden">
    <label>📧 Email 驗證</label>
    <div class="verify-row">
      <input type="email" id="email" placeholder="your@email.com" />
      <button class="verify-btn" id="send-code-btn" onclick="sendCode()">發送驗證碼</button>
    </div>
    <div id="code-row" class="verify-row hidden">
      <input type="text" id="verify-code" placeholder="輸入 6 位驗證碼" maxlength="6" />
      <button class="verify-btn" id="verify-btn" onclick="verifyEmail()">驗證</button>
    </div>
    <div class="verify-status" id="verify-status"></div>
  </div>

  <!-- 表單 -->
  <div id="form-section" class="form-section hidden">
    <label>姓名</label>
    <input type="text" id="name" placeholder="您的姓名" />
    <label>電話</label>
    <input type="tel" id="phone" placeholder="0912-345-678" />
    <label>備註（選填）</label>
    <textarea id="note" placeholder="有什麼需要備註的嗎？"></textarea>
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">🎫 確認購票</button>
  </div>

  <div id="error-msg" class="error-msg hidden"></div>
</div>

<!-- ── 成功畫面 ── -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">🎉</div>
  <h2 class="success-title">購票成功！</h2>
  <p class="success-msg">請截圖保存您的簽到碼，活動當天出示即可入場 🎪</p>
  <div class="success-badge" id="success-id"></div>
  <br/>
  <div class="checkin-code-display" id="checkin-code"></div>
  <div class="checkin-label">簽到碼 — 請妥善保存</div>
  <button class="new-order-btn" onclick="resetPage()">再次購票</button>
</div>

<footer>Starlight Festival Sample — Powered by One Page Go</footer>

<script>
// ── 設定你的 Apps Script 網址 ──────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbwsQeEcGI2BjQh50QzYHk2poaIHHQ7rRTSGsvZ0_4bWh-byiygjO0k0hqIiqOpNs_XZ/exec";

const EVENT_EMOJI = ["🎪","🎵","🎨","🎭","🎶","✨"];

let events = [];
let selectedEvent = null;
let ticketTypes = [];
let selectedTicket = null;
let qty = 1;
let emailVerified = false;
let verifiedEmail = '';

// ── Session Token ──
function getSessionToken() { return sessionStorage.getItem('opg_session_token') || ''; }
function saveSessionToken(t) { sessionStorage.setItem('opg_session_token', t); }

// ── 載入活動 ────────────────────────────────────────
async function loadEvents() {
  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getEvents' })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    events = data.events || [];
    renderEvents();
  } catch (err) {
    document.getElementById('events-container').innerHTML =
      '<div class="loading-wrap">目前暫無售票活動，請稍後再來</div>';
  }
}

function renderEvents() {
  const container = document.getElementById('events-container');
  if (!events.length) {
    container.innerHTML = '<div class="loading-wrap">目前暫無售票活動，請稍後再來</div>';
    return;
  }
  container.innerHTML = events.map((e, i) => {
    const emoji = EVENT_EMOJI[i % EVENT_EMOJI.length];
    const imgHtml = e.image_url
      ? `<img src="${e.image_url}" alt="${e.name}" />`
      : emoji;
    return `
      <div class="event-card" id="evt-${e.id}" onclick="selectEvent('${e.id}')" style="animation-delay:${i*0.08}s">
        <div class="event-img">${imgHtml}</div>
        <div class="event-name">${e.name}</div>
        <div class="event-desc">${e.description || ''}</div>
        <div class="event-info">
          <span class="event-badge">📅 ${e.date}</span>
          <span class="event-badge">⏰ ${e.time}</span>
          <span class="event-badge">📍 ${e.venue}</span>
        </div>
      </div>`;
  }).join('');
}

// ── 選擇活動 → 載入票種 ────────────────────────────
async function selectEvent(id) {
  selectedEvent = events.find(e => String(e.id) === String(id));
  if (!selectedEvent) return;

  // 標記選中
  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('evt-' + id).classList.add('selected');

  // 重設狀態
  selectedTicket = null;
  qty = 1;
  document.getElementById('qty-section').classList.add('hidden');
  document.getElementById('order-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 載入票種
  const section = document.getElementById('ticket-section');
  const container = document.getElementById('ticket-types-container');
  section.classList.remove('hidden');
  container.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getTicketTypes', event_id: id })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    ticketTypes = data.ticketTypes || [];

    if (!ticketTypes.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:1rem;">此活動暫無可購票種</div>';
      return;
    }

    container.innerHTML = ticketTypes.map(t => `
      <button class="ticket-type-btn" id="tt-${t.id}" onclick="selectTicketType('${t.id}')">
        <span class="ticket-type-name">🎫 ${t.name}</span>
        <span class="ticket-type-meta">
          <span class="ticket-type-price">$${t.price}</span>
          <span class="remaining-badge">剩 ${t.available} 張</span>
        </span>
      </button>
    `).join('');
  } catch (err) {
    container.innerHTML = '<div style="text-align:center;color:#7a3a3a;font-size:0.8rem;">載入票種失敗</div>';
  }

  section.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── 選擇票種 ────────────────────────────────────────
function selectTicketType(id) {
  selectedTicket = ticketTypes.find(t => String(t.id) === String(id));
  if (!selectedTicket) return;

  // 標記選中
  document.querySelectorAll('.ticket-type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('tt-' + id).classList.add('selected');

  // 重設數量
  qty = 1;
  document.getElementById('qty-display').textContent = qty;
  document.getElementById('qty-hint').textContent = `最多可購 ${Math.min(selectedTicket.available, 4)} 張`;

  // 顯示數量選擇
  document.getElementById('qty-section').classList.remove('hidden');
  updateSummary();

  document.getElementById('qty-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function changeQty(delta) {
  if (!selectedTicket) return;
  const maxQty = Math.min(selectedTicket.available, 4); // 每人最多 4 張
  const newQty = qty + delta;
  if (newQty < 1 || newQty > maxQty) return;
  qty = newQty;
  document.getElementById('qty-display').textContent = qty;
  updateSummary();
}

function updateSummary() {
  if (!selectedEvent || !selectedTicket) return;

  document.getElementById('sum-event').textContent = selectedEvent.name;
  document.getElementById('sum-ticket').textContent = selectedTicket.name;
  document.getElementById('sum-price').textContent = '$' + selectedTicket.price;
  document.getElementById('sum-qty').textContent = qty + ' 張';
  document.getElementById('sum-total').textContent = '$' + (selectedTicket.price * qty);

  document.getElementById('order-summary').classList.remove('hidden');
  document.getElementById('verify-section').classList.remove('hidden');

  if (emailVerified) {
    document.getElementById('form-section').classList.remove('hidden');
  }
}

// ── Email 驗證 ──────────────────────────────────────
async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('請輸入 Email'); return; }

  const btn = document.getElementById('send-code-btn');
  btn.disabled = true;
  btn.textContent = '發送中…';
  hideError();

  try {
    const checkRes = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'checkMember', email })
    });
    const checkData = JSON.parse(await checkRes.text());

    if (checkData.blocked) { showError('此 Email 已被停用，請聯繫主辦單位'); btn.disabled = false; btn.textContent = '發送驗證碼'; return; }
    if (checkData.hasActiveOrder) { showError('您有未完成的訂單，請先完成付款後再購票'); btn.disabled = false; btn.textContent = '發送驗證碼'; return; }

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'sendVerifyCode', email })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('code-row').classList.remove('hidden');
      document.getElementById('verify-status').textContent = '驗證碼已寄出，請查看信箱';
      document.getElementById('verify-status').style.color = 'var(--green)';
      let sec = 60;
      btn.textContent = `${sec}s`;
      const timer = setInterval(() => {
        sec--;
        btn.textContent = `${sec}s`;
        if (sec <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '重新發送'; }
      }, 1000);
    } else {
      showError(data.error || '發送失敗');
      btn.disabled = false;
      btn.textContent = '發送驗證碼';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '發送驗證碼';
  }
}

async function verifyEmail() {
  const email = document.getElementById('email').value.trim();
  const code  = document.getElementById('verify-code').value.trim();
  if (!code) { showError('請輸入驗證碼'); return; }

  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.textContent = '驗證中…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'verifyCode', email, code })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      emailVerified = true;
      verifiedEmail = email;
      if (data.sessionToken) saveSessionToken(data.sessionToken);
      showVerified();
    } else {
      showError(data.error || '驗證失敗');
      btn.disabled = false;
      btn.textContent = '驗證';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '驗證';
  }
}

function showVerified() {
  document.getElementById('verify-status').textContent = '✅ 驗證成功';
  document.getElementById('verify-status').style.color = 'var(--green)';
  document.getElementById('email').disabled = true;
  document.getElementById('verify-code').disabled = true;
  document.getElementById('verify-btn').disabled = true;
  document.getElementById('verify-btn').textContent = '已驗證';
  document.getElementById('send-code-btn').classList.add('hidden');
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('form-section').classList.remove('hidden');
}

// ── 送出訂單 ────────────────────────────────────────
async function submitOrder() {
  const name  = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const note  = document.getElementById('note').value.trim();

  hideError();
  if (!name)  { showError('請輸入姓名'); return; }
  if (!phone) { showError('請輸入電話'); return; }
  const phoneClean = phone.replace(/[-\s]/g, '');
  if (!/^09\d{8}$/.test(phoneClean)) { showError('請輸入有效的手機號碼（09 開頭，共 10 碼）'); return; }
  if (!selectedEvent || !selectedTicket) { showError('請選擇活動和票種'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送出中…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'submitTicketOrder',
        sessionToken: getSessionToken(),
        email: verifiedEmail,
        name,
        phone,
        event_id: String(selectedEvent.id),
        ticket_type_id: String(selectedTicket.id),
        qty,
        note
      })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('shop-view').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      document.getElementById('success-id').textContent = '訂單編號：' + data.orderId;
      document.getElementById('checkin-code').textContent = data.checkinCode;
    } else {
      showError(data.error || '購票失敗');
      btn.disabled = false;
      btn.textContent = '🎫 確認購票';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '🎫 確認購票';
  }
}

// ── 重置 ────────────────────────────────────────────
function resetPage() {
  selectedEvent = null;
  selectedTicket = null;
  ticketTypes = [];
  qty = 1;
  emailVerified = false;
  verifiedEmail = '';

  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('shop-view').style.display = 'block';

  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('ticket-section').classList.add('hidden');
  document.getElementById('qty-section').classList.add('hidden');
  document.getElementById('order-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 重建驗證區
  document.getElementById('email').disabled = false;
  document.getElementById('email').value = '';
  document.getElementById('verify-code').disabled = false;
  document.getElementById('verify-code').value = '';
  document.getElementById('send-code-btn').classList.remove('hidden');
  document.getElementById('send-code-btn').disabled = false;
  document.getElementById('send-code-btn').textContent = '發送驗證碼';
  document.getElementById('verify-btn').disabled = false;
  document.getElementById('verify-btn').textContent = '驗證';
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('verify-status').textContent = '';

  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('note').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '🎫 確認購票';
  document.getElementById('qty-display').textContent = '1';

  hideError();
  loadEvents();
}

// ── 工具 ────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-msg').classList.add('hidden');
}

// ── 啟動 ────────────────────────────────────────────
loadEvents();
</script>
</body>
</html>
