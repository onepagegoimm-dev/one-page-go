<script>
// ── 設定你的 Apps Script 網址 ──────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbzWeGr_5fgsdZlOKhBNHzxlTVpAO854Kg1R-0WoCHTE9zqwKqikdUoECnqltS7Ltq_V/exec";

let services = [];
let selectedService = null;
let selectedDesigner = null;
let selectedDate = '';
let selectedTime = '';
let emailVerified = false;
let verifiedEmail = '';
let sessionToken = '';

// ── 解析設計師資訊 ──────────────────────────────────────
function parseDesigners(description) {
  if (!description) return { text: '', designers: [] };
  const parts = String(description).split('｜');
  const text = parts[0].trim();
  if (parts.length < 2) return { text, designers: [] };

  const config = parts[1].trim();
  const match = config.match(/^設計師[：:]\s*(.+)$/);
  if (!match) return { text, designers: [] };

  const designers = match[1].split(',').map(d => {
    const m = d.trim().match(/^(.+?)\s*[⭐★]\s*([\d.]+)$/);
    if (m) return { name: m[1].trim(), rating: parseFloat(m[2]) };
    return { name: d.trim(), rating: 0 };
  }).filter(d => d.name);

  return { text, designers };
}

// ── 載入服務（POST） ────────────────────────────────────
async function loadServices() {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getServices' })
    });
    const data = JSON.parse(await res.text());
    services = data.services || [];
    renderServices();
  } catch (err) {
    document.getElementById('services-container').innerHTML =
      '<div class="loading-wrap" style="color:var(--muted);font-size:0.85rem;">目前暫無服務，請稍後再來</div>';
  }
}

function renderServices() {
  const container = document.getElementById('services-container');
  if (!services.length) {
    container.innerHTML = '<div class="loading-wrap" style="color:var(--muted);font-size:0.85rem;">目前暫無服務，請稍後再來</div>';
    return;
  }
  container.innerHTML = services.map((s, i) => {
    const parsed = parseDesigners(s.description);
    const imgHtml = s.image_url
      ? `<img src="${s.image_url}" alt="${s.name}" style="width:100%;margin-bottom:0.5rem;" />`
      : '';
    return `
      <div class="service-card" id="svc-${s.id}" onclick="selectService('${s.id}')" style="animation-delay:${i*0.08}s">
        ${imgHtml}
        <div class="service-name">${s.name}</div>
        <div class="service-desc">${parsed.text}</div>
        <div class="service-meta">
          <span class="service-price">$${s.price}</span>
          <span class="duration-badge">${s.duration_min} MIN</span>
        </div>
      </div>`;
  }).join('');
}

// ── 選擇服務 ──────────────────────────────────────────
function selectService(id) {
  selectedService = services.find(s => String(s.id) === String(id));
  if (!selectedService) return;
  selectedDesigner = null;

  document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('svc-' + id).classList.add('selected');

  // 解析設計師
  const parsed = parseDesigners(selectedService.description);

  // 顯示設計師選擇
  const designerSection = document.getElementById('designer-section');
  const designerGrid = document.getElementById('designer-grid');

  if (parsed.designers.length > 0) {
    designerGrid.innerHTML = `
      <div class="designer-card selected" onclick="selectDesigner(this, null)">
        <div class="d-icon">🔄</div>
        <div class="d-name">不指定</div>
        <div class="d-rating" style="color:var(--muted);">系統安排</div>
      </div>
    ` + parsed.designers.map(d => `
      <div class="designer-card" onclick="selectDesigner(this, '${d.name}', ${d.rating})">
        <div class="d-icon">💇‍♂️</div>
        <div class="d-name">${d.name}</div>
        <div class="d-rating">⭐ ${d.rating}</div>
      </div>
    `).join('');
    designerSection.classList.remove('hidden');
  } else {
    designerSection.classList.add('hidden');
  }

  // 顯示日期選擇
  document.getElementById('date-time-section').classList.remove('hidden');
  document.getElementById('timeslots-container').classList.add('hidden');
  document.getElementById('booking-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  const dateInput = document.getElementById('booking-date');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;
  dateInput.value = '';
  selectedDate = '';
  selectedTime = '';

  designerSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── 選擇設計師 ──────────────────────────────────────
function selectDesigner(el, name, rating) {
  document.querySelectorAll('.designer-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedDesigner = name ? { name, rating } : null;
  updateSummary();
}

// ── 日期變更 → 載入時段（POST） ────────────────────────
document.getElementById('booking-date').addEventListener('change', async function() {
  selectedDate = this.value;
  selectedTime = '';
  if (!selectedDate) return;

  const container = document.getElementById('timeslots-container');
  const grid = document.getElementById('timeslots-grid');
  container.classList.remove('hidden');
  grid.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getTimeSlots', date: selectedDate })
    });
    const data = JSON.parse(await res.text());
    const slots = data.slots || [];

    if (!slots.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:0.82rem;padding:1rem;letter-spacing:0.05em;">此日期暫無可預約時段</div>';
      return;
    }

    grid.innerHTML = slots.map(s => `
      <button class="time-slot-btn" onclick="selectTimeSlot(this, '${s.time_slot}')">
        ${s.time_slot}
        <span class="remaining">剩 ${s.remaining} 位</span>
      </button>
    `).join('');
  } catch (err) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#7a3a3a;font-size:0.8rem;">載入時段失敗</div>';
  }
});

// ── 選擇時段 ──────────────────────────────────────────
function selectTimeSlot(el, time) {
  selectedTime = time;

  document.querySelectorAll('.time-slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');

  updateSummary();

  document.getElementById('booking-summary').classList.remove('hidden');
  document.getElementById('verify-section').classList.remove('hidden');

  if (emailVerified) {
    document.getElementById('form-section').classList.remove('hidden');
  }
}

// ── 更新摘要 ──────────────────────────────────────────
function updateSummary() {
  if (!selectedService) return;
  document.getElementById('sum-service').textContent = selectedService.name;
  document.getElementById('sum-duration').textContent = selectedService.duration_min + ' MIN';
  document.getElementById('sum-date').textContent = selectedDate || '—';
  document.getElementById('sum-time').textContent = selectedTime || '—';
  document.getElementById('sum-price').textContent = '$' + selectedService.price;

  const designerRow = document.getElementById('sum-designer-row');
  const designerText = document.getElementById('sum-designer');
  if (selectedDesigner) {
    designerText.textContent = selectedDesigner.name + ' ⭐' + selectedDesigner.rating;
    designerRow.style.display = 'flex';
  } else {
    designerText.textContent = '不指定';
    designerRow.style.display = 'flex';
  }
}

// ── Email 驗證 ────────────────────────────────────────
async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('請輸入 Email'); return; }

  const btn = document.getElementById('send-code-btn');
  btn.disabled = true;
  btn.textContent = 'SENDING…';
  hideError();

  try {
    const checkRes = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'checkMember', email })
    });
    const checkData = JSON.parse(await checkRes.text());

    if (checkData.blocked) { showError('此 Email 已被停用，請聯繫店家'); btn.disabled = false; btn.textContent = 'SEND CODE'; return; }
    if (checkData.hasActiveOrder) { showError('您有未完成的預約，完成後才能再次預約'); btn.disabled = false; btn.textContent = 'SEND CODE'; return; }

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'sendVerifyCode', email })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('code-row').classList.remove('hidden');
      document.getElementById('verify-status').textContent = '驗證碼已寄出，請查看信箱';
      document.getElementById('verify-status').style.color = '#3A7A4F';
      let sec = 60;
      btn.textContent = `${sec}s`;
      const timer = setInterval(() => {
        sec--;
        btn.textContent = `${sec}s`;
        if (sec <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = 'RESEND'; }
      }, 1000);
    } else {
      showError(data.error || '發送失敗');
      btn.disabled = false;
      btn.textContent = 'SEND CODE';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = 'SEND CODE';
  }
}

async function verifyEmail() {
  const email = document.getElementById('email').value.trim();
  const code  = document.getElementById('verify-code').value.trim();
  if (!code) { showError('請輸入驗證碼'); return; }

  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.textContent = '…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'verifyCode', email, code })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      emailVerified = true;
      verifiedEmail = email;
      sessionToken = data.sessionToken || '';
      showVerified();
    } else {
      showError(data.error || '驗證失敗');
      btn.disabled = false;
      btn.textContent = 'VERIFY';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = 'VERIFY';
  }
}

function showVerified() {
  document.getElementById('verify-status').textContent = '✅ 驗證成功';
  document.getElementById('verify-status').style.color = '#3A7A4F';
  document.getElementById('email').disabled = true;
  document.getElementById('verify-code').disabled = true;
  document.getElementById('verify-btn').disabled = true;
  document.getElementById('verify-btn').textContent = '✓';
  document.getElementById('send-code-btn').classList.add('hidden');
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('form-section').classList.remove('hidden');
}

// ── 送出預約 ──────────────────────────────────────────
async function submitBooking() {
  const name  = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  let   note  = document.getElementById('note').value.trim();

  hideError();
  if (!name)  { showError('請輸入姓名'); return; }
  if (!phone) { showError('請輸入電話'); return; }
  const phoneClean = phone.replace(/[-\s]/g, '');
  if (!/^09\d{8}$/.test(phoneClean)) { showError('請輸入有效的手機號碼（09 開頭，共 10 碼）'); return; }
  if (!selectedService || !selectedDate || !selectedTime) { showError('請完成服務、日期、時段選擇'); return; }

  // 將設計師資訊寫入 note
  if (selectedDesigner) {
    const designerNote = `【指定】${selectedDesigner.name} ⭐${selectedDesigner.rating}`;
    note = note ? designerNote + '\n' + note : designerNote;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'SUBMITTING…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'submitBooking',
        email: verifiedEmail,
        sessionToken,
        name,
        phone,
        service_id: String(selectedService.id),
        booking_date: selectedDate,
        booking_time: selectedTime,
        note
      })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('shop-view').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      document.getElementById('success-id').textContent = data.bookingId;
    } else {
      showError(data.error || '預約失敗');
      btn.disabled = false;
      btn.textContent = '✂ CONFIRM BOOKING';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '✂ CONFIRM BOOKING';
  }
}

// ── 重置 ──────────────────────────────────────────────
function resetPage() {
  selectedService = null;
  selectedDesigner = null;
  selectedDate = '';
  selectedTime = '';
  emailVerified = false;
  verifiedEmail = '';
  sessionToken = '';

  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('shop-view').style.display = 'block';

  document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('designer-section').classList.add('hidden');
  document.getElementById('date-time-section').classList.add('hidden');
  document.getElementById('booking-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  document.getElementById('email').disabled = false;
  document.getElementById('email').value = '';
  document.getElementById('verify-code').disabled = false;
  document.getElementById('verify-code').value = '';
  document.getElementById('send-code-btn').classList.remove('hidden');
  document.getElementById('send-code-btn').disabled = false;
  document.getElementById('send-code-btn').textContent = 'SEND CODE';
  document.getElementById('verify-btn').disabled = false;
  document.getElementById('verify-btn').textContent = 'VERIFY';
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('verify-status').textContent = '';

  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('note').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '✂ CONFIRM BOOKING';
  document.getElementById('booking-date').value = '';

  hideError();
  renderServices();
}

// ── 工具 ──────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-msg').classList.add('hidden');
}

// ── 啟動 ──────────────────────────────────────────────
loadServices();
</script>
