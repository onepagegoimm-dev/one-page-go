<style>
  :root {
    --primary:   #FF0066;
    --secondary: #00FF88;
    --accent:    #FFE600;
    --bg:        #0A0A0A;
    --card:      #1A1A2E;
    --border:    #333366;
    --text:      #FFFFFF;
    --muted:     #AAAACC;
    --green:     #00FF88;
    --orange:    #FF9800;
    --red:       #FF0066;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* -- CRT vignette -- */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  }

  /* -- CRT scanline overlay -- */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
  }

  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 2.5rem 1.5rem 1.5rem;
    background: linear-gradient(180deg, rgba(51,51,102,0.3) 0%, transparent 100%);
  }

  .logo-wrap { display: inline-flex; flex-direction: column; align-items: center; gap: 0.3rem; }
  .logo-icon {
    font-size: 2.8rem;
    line-height: 1;
    animation: crt-flicker 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,0,102,0.6));
  }
  @keyframes crt-flicker {
    0%, 100% { opacity: 1; }
    3%       { opacity: 0.7; }
    6%       { opacity: 1; }
    50%      { opacity: 1; }
    52%      { opacity: 0.85; }
    54%      { opacity: 1; }
  }
  .logo-name {
    font-family: 'Courier New', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255,0,102,0.5), 0 0 30px rgba(255,0,102,0.3);
    text-transform: uppercase;
  }
  .logo-sub {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-shadow: 0 0 8px rgba(255,230,0,0.4);
  }

  .deco-line {
    margin-top: 0.8rem;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: var(--secondary);
    letter-spacing: 0.3em;
    text-shadow: 0 0 6px rgba(0,255,136,0.4);
  }

  .main {
    position: relative; z-index: 5;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 1.2rem 3rem;
  }

  .section-title {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    margin: 1.5rem 0 1rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(255,230,0,0.4);
    text-transform: uppercase;
  }

  /* -- pixel border mixin via box-shadow -- */
  .pixel-border {
    box-shadow:
      inset 1px 1px 0 var(--border),
      inset -1px -1px 0 var(--border),
      2px 2px 0 rgba(51,51,102,0.5),
      -1px -1px 0 rgba(51,51,102,0.3);
  }

  /* -- 活動卡片 -- */
  .event-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      inset -1px -1px 0 rgba(51,51,102,0.3),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .event-card:hover {
    transform: translateY(-3px);
    box-shadow:
      0 0 15px rgba(255,0,102,0.3),
      0 0 30px rgba(255,0,102,0.15),
      inset 1px 1px 0 rgba(255,0,102,0.3);
    border-color: var(--primary);
  }
  .event-card.selected {
    border: 2px solid var(--primary);
    box-shadow:
      0 0 20px rgba(255,0,102,0.4),
      0 0 40px rgba(255,0,102,0.2),
      inset 0 0 15px rgba(255,0,102,0.05);
  }

  .event-img { font-size: 2.5rem; text-align: center; margin-bottom: 0.6rem; }
  .event-img img { width: 100%; border-radius: 4px; border: 1px solid var(--border); }
  .event-name {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.3rem;
    color: var(--accent);
    text-shadow: 0 0 6px rgba(255,230,0,0.3);
  }
  .event-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
  .event-info { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.3rem; }
  .event-badge {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    background: rgba(0,255,136,0.08);
    color: var(--secondary);
    border: 1px solid rgba(0,255,136,0.2);
  }

  /* -- 座位區域選擇器 -- */
  .zone-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .zone-section > label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    margin-bottom: 0.8rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(255,230,0,0.3);
  }

  /* venue map */
  .venue-map {
    background: rgba(0,0,0,0.5);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 1rem 0.8rem;
    margin-bottom: 0.5rem;
  }
  .venue-stage {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 4px;
    padding: 0.5rem;
    margin-bottom: 0.8rem;
    border: 1px dashed var(--primary);
    border-radius: 2px;
    text-shadow: 0 0 8px rgba(255,0,102,0.5);
    background: rgba(255,0,102,0.05);
  }

  .zone-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text);
    cursor: pointer;
    margin-bottom: 0.5rem;
    transition: all 0.3s;
    box-shadow: inset 1px 1px 0 rgba(51,51,102,0.4);
  }
  .zone-card:hover {
    background: rgba(255,0,102,0.08);
    border-color: var(--primary);
    box-shadow: 0 0 10px rgba(255,0,102,0.2);
  }
  .zone-card.selected {
    background: rgba(255,0,102,0.15);
    color: white;
    border-color: var(--primary);
    box-shadow:
      0 0 15px rgba(255,0,102,0.4),
      0 0 30px rgba(255,0,102,0.2);
    animation: pixel-pulse 1.5s ease-in-out infinite;
  }
  @keyframes pixel-pulse {
    0%, 100% { box-shadow: 0 0 15px rgba(255,0,102,0.4), 0 0 30px rgba(255,0,102,0.2); }
    50%      { box-shadow: 0 0 20px rgba(255,0,102,0.6), 0 0 40px rgba(255,0,102,0.3); }
  }

  .zone-name {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 4px rgba(255,230,0,0.3);
  }
  .zone-card.selected .zone-name { color: var(--accent); }
  .zone-meta { text-align: right; }
  .zone-price {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: var(--secondary);
    text-shadow: 0 0 4px rgba(0,255,136,0.3);
  }
  .zone-remaining {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    display: block;
  }
  .remaining-green  { color: var(--green); }
  .remaining-orange { color: var(--orange); }
  .remaining-red    { color: var(--red); animation: pulse-remaining 1.5s ease-in-out infinite; }
  .zone-card.selected .zone-remaining { color: rgba(255,255,255,0.8); }
  .zone-card.selected .remaining-red  { animation: none; color: rgba(255,255,255,0.8); }

  @keyframes pulse-remaining {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }

  /* -- 票種選擇 -- */
  .ticket-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .ticket-section label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(255,230,0,0.3);
  }

  .ticket-type-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text);
    cursor: pointer;
    margin-bottom: 0.5rem;
    transition: all 0.3s;
    box-shadow: inset 1px 1px 0 rgba(51,51,102,0.4);
  }
  .ticket-type-btn:hover {
    background: rgba(255,0,102,0.08);
    border-color: var(--primary);
    box-shadow: 0 0 10px rgba(255,0,102,0.2);
  }
  .ticket-type-btn.selected {
    background: rgba(255,0,102,0.15);
    color: white;
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(255,0,102,0.4), 0 0 30px rgba(255,0,102,0.2);
  }

  .ticket-type-name {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 4px rgba(255,230,0,0.3);
  }
  .ticket-type-btn.selected .ticket-type-name { color: var(--accent); }
  .ticket-type-meta { text-align: right; }
  .ticket-type-price {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: var(--secondary);
    text-shadow: 0 0 4px rgba(0,255,136,0.3);
  }
  .ticket-type-btn.selected .ticket-type-price { color: var(--secondary); }
  .remaining-badge {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    opacity: 0.8;
    display: block;
    color: var(--muted);
  }
  .ticket-type-btn.selected .remaining-badge { color: rgba(255,255,255,0.7); }

  /* -- 數量選擇 -- */
  .qty-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .qty-section label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(255,230,0,0.3);
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
  }
  .qty-btn {
    width: 38px; height: 38px;
    border: 1px solid var(--primary);
    border-radius: 4px;
    background: var(--card);
    font-family: 'Courier New', monospace;
    font-size: 1.2rem;
    color: var(--primary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    box-shadow: 0 0 8px rgba(255,0,102,0.15);
  }
  .qty-btn:hover {
    background: rgba(255,0,102,0.15);
    box-shadow: 0 0 15px rgba(255,0,102,0.4);
  }
  .qty-display {
    font-family: 'Courier New', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 40px;
    text-align: center;
    text-shadow: 0 0 8px rgba(255,230,0,0.4);
  }
  .qty-hint {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
  }

  /* -- 訂單摘要 -- */
  .order-summary {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .summary-title {
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
    color: var(--accent);
    text-shadow: 0 0 6px rgba(255,230,0,0.3);
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 0.3rem;
    color: var(--text);
  }
  .summary-total {
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
    margin-top: 0.5rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: var(--secondary);
    text-shadow: 0 0 6px rgba(0,255,136,0.3);
  }

  /* -- Email 驗證 -- */
  .verify-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .verify-section > label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    margin-bottom: 0.6rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(255,230,0,0.3);
  }
  .verify-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
  .verify-row input { flex: 1; }
  .verify-btn {
    padding: 0.55rem 0.8rem;
    border: 1px solid var(--primary);
    border-radius: 4px;
    background: rgba(255,0,102,0.15);
    color: var(--primary);
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s;
    box-shadow: 0 0 10px rgba(255,0,102,0.2);
  }
  .verify-btn:hover {
    background: rgba(255,0,102,0.3);
    box-shadow: 0 0 20px rgba(255,0,102,0.4);
  }
  .verify-btn:disabled {
    background: rgba(170,170,204,0.1);
    color: var(--muted);
    border-color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
  }
  .verify-status { font-size: 0.75rem; margin-top: 0.3rem; }

  /* -- 表單 -- */
  .form-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s ease both;
    box-shadow:
      inset 1px 1px 0 rgba(51,51,102,0.6),
      0 2px 12px rgba(0,0,0,0.4);
  }
  .form-section label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    margin-bottom: 0.3rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .form-section input, .form-section textarea {
    width: 100%;
    padding: 0.55rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text);
    background: rgba(0,0,0,0.4);
    margin-bottom: 0.8rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-section input:focus, .form-section textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 10px rgba(255,0,102,0.2);
  }
  .form-section textarea { height: 70px; resize: vertical; }

  /* -- 送出按鈕 -- */
  .submit-btn {
    width: 100%;
    padding: 0.8rem;
    border: 2px solid var(--primary);
    border-radius: 4px;
    background: rgba(255,0,102,0.15);
    color: var(--primary);
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(255,0,102,0.3);
    text-shadow: 0 0 8px rgba(255,0,102,0.5);
  }
  .submit-btn:hover {
    background: rgba(255,0,102,0.3);
    box-shadow: 0 0 30px rgba(255,0,102,0.5), 0 0 60px rgba(255,0,102,0.2);
  }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; text-shadow: none; }

  /* -- 成功畫面 -- */
  .success-screen {
    display: none;
    position: relative; z-index: 5;
    max-width: 480px; margin: 0 auto; padding: 3rem 1.5rem;
    text-align: center;
  }
  .success-icon { font-size: 3rem; animation: pop 0.6s ease; }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .success-title {
    font-family: 'Courier New', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--secondary);
    margin: 0.8rem 0 0.5rem;
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(0,255,136,0.5);
    text-transform: uppercase;
  }
  .success-msg { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.2rem; }
  .success-badge {
    display: inline-block;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.3);
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--secondary);
    font-weight: 700;

  }
  .success-zone {
    display: inline-block;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 0.8rem;
    text-shadow: 0 0 8px rgba(255,230,0,0.4);
  }

  .checkin-code-display {
    display: inline-block;
    background: rgba(0,255,136,0.06);
    border: 2px solid var(--secondary);
    padding: 0.8rem 1.5rem;
    border-radius: 4px;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--secondary);
    letter-spacing: 0.3em;
    margin-bottom: 0.5rem;
    font-family: 'Courier New', monospace;
    box-shadow: 0 0 20px rgba(0,255,136,0.3), 0 0 40px rgba(0,255,136,0.15);
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
  .checkin-label {
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .new-order-btn {
    padding: 0.7rem 2rem;
    border: 2px solid var(--secondary);
    border-radius: 4px;
    background: transparent;
    color: var(--secondary);
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 2px;

  }
  .new-order-btn:hover {
    background: rgba(0,255,136,0.15);
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  /* -- Loading / Error -- */
  .loading-wrap { text-align: center; padding: 2rem; color: var(--muted); }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    background: rgba(255,0,102,0.1);
    border: 1px solid rgba(255,0,102,0.3);
    color: var(--primary);
    padding: 0.6rem 1rem;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .hidden { display: none !important; }

  footer {
    position: relative; z-index: 5;
    text-align: center; padding: 1.5rem;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    color: rgba(170,170,204,0.4);
    letter-spacing: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">&#x1F579;&#xFE0F;</div>
    <div class="logo-name">Retro Arcade Night</div>
    <div class="logo-sub">INSERT COIN TO PLAY</div>
  </div>
  <div class="deco-line">&#x2726; &#x5FA9;&#x53E4;&#x96FB;&#x73A9;&#x591C; &middot; &#x6295;&#x5E63;&#x958B;&#x6230; &#x2726;</div>
</header>

<!-- -- 主頁面 -- -->
<div class="main" id="shop-view">
  <h2 class="section-title">&#x1F579;&#xFE0F; SELECT GAME</h2>
  <div id="events-container">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <!-- 座位區域選擇 -->
  <div id="zone-section" class="zone-section hidden">
    <label>&#x1F3AE; SELECT ZONE</label>
    <div class="venue-map">
      <div class="venue-stage">&#x2588;&#x2588;&#x2588; STAGE &#x2588;&#x2588;&#x2588;</div>
      <div id="zone-container"></div>
    </div>
  </div>

  <!-- 票種選擇 -->
  <div id="ticket-section" class="ticket-section hidden">
    <label>&#x1F3AB; SELECT TICKET</label>
    <div id="ticket-types-container">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- 數量選擇 -->
  <div id="qty-section" class="qty-section hidden">
    <label>&#x1F4E6; PLAYER COUNT</label>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeQty(-1)">&minus;</button>
      <div class="qty-display" id="qty-display">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="qty-hint" id="qty-hint"></div>
  </div>

  <!-- 訂單摘要 -->
  <div id="order-summary" class="order-summary hidden">
    <div class="summary-title">&#x1F4CB; ORDER STATUS</div>
    <div class="summary-row"><span>活動</span><span id="sum-event"></span></div>
    <div class="summary-row" id="sum-zone-row" style="display:none;"><span>區域</span><span id="sum-zone"></span></div>
    <div class="summary-row"><span>票種</span><span id="sum-ticket"></span></div>
    <div class="summary-row"><span>單價</span><span id="sum-price"></span></div>
    <div class="summary-row"><span>數量</span><span id="sum-qty"></span></div>
    <div class="summary-row summary-total"><span>合計</span><span id="sum-total"></span></div>
  </div>

  <!-- Email 驗證 -->
  <div id="verify-section" class="verify-section hidden">
    <label>&#x1F4E7; EMAIL VERIFY</label>
    <div class="verify-row">
      <input type="email" id="email" placeholder="your@email.com" />
      <button class="verify-btn" id="send-code-btn" onclick="sendCode()">發送驗證碼</button>
    </div>
    <div id="code-row" class="verify-row hidden">
      <input type="text" id="verify-code" placeholder="輸入 6 位驗證碼" maxlength="6" />
      <button class="verify-btn" id="verify-btn" onclick="verifyEmail()">驗證</button>
    </div>
    <div class="verify-status" id="verify-status"></div>
  </div>

  <!-- 表單 -->
  <div id="form-section" class="form-section hidden">
    <label>PLAYER NAME</label>
    <input type="text" id="name" placeholder="您的姓名" />
    <label>PHONE</label>
    <input type="tel" id="phone" placeholder="0912-345-678" />
    <label>NOTE（選填）</label>
    <textarea id="note" placeholder="有什麼需要備註的嗎？"></textarea>
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">&#x1F579;&#xFE0F; INSERT COIN</button>
  </div>

  <div id="error-msg" class="error-msg hidden"></div>
</div>

<!-- -- 成功畫面 -- -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">&#x1F3AE;</div>
  <h2 class="success-title">GAME ON!</h2>
  <p class="success-msg">請截圖保存您的簽到碼，活動當天出示即可入場</p>
  <div class="success-badge" id="success-id"></div>
  <br/>
  <div id="success-zone-display" class="success-zone hidden"></div>
  <br/>
  <div class="checkin-code-display" id="checkin-code"></div>
  <div class="checkin-label">CHECKIN CODE &mdash; 請妥善保存</div>
  <button class="new-order-btn" onclick="resetPage()">CONTINUE? INSERT COIN</button>
</div>

<footer>Retro Arcade Night Sample &mdash; Powered by One Page Go</footer>

<script>
// -- 設定你的 Apps Script 網址 --
const API_URL = "https://script.google.com/macros/s/AKfycbzirB6dZQAlhBgNs59CxkUPmwWuEaG-yoggo-kdZtabwdINPppiIuiPldOMQZnZMDkDCg/exec";

const EVENT_EMOJI = ["\u{1F579}\uFE0F","\u{1F47E}","\u{1F3AE}","\u{1F47D}","\u{1F525}","\u26A1"];

let events = [];
let selectedEvent = null;
let ticketTypes = [];
let selectedTicket = null;
let qty = 1;
let emailVerified = false;
let verifiedEmail = '';
let sessionToken = '';

// 區域相關
let zones = [];
let selectedZone = null;
let hasZoneConfig = false;

// -- 載入活動 --
async function loadEvents() {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getEvents' })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    events = data.events || [];
    renderEvents();
  } catch (err) {
    document.getElementById('events-container').innerHTML =
      '<div class="loading-wrap">目前暫無售票活動，請稍後再來</div>';
  }
}

function renderEvents() {
  const container = document.getElementById('events-container');
  if (!events.length) {
    container.innerHTML = '<div class="loading-wrap">目前暫無售票活動，請稍後再來</div>';
    return;
  }
  container.innerHTML = events.map((e, i) => {
    const emoji = EVENT_EMOJI[i % EVENT_EMOJI.length];
    const imgHtml = e.image_url
      ? `<img src="${e.image_url}" alt="${e.name}" />`
      : emoji;
    // 過濾 description 中的區域設定（不顯示在卡片上）
    const displayDesc = stripZoneConfig(e.description || '');
    return `
      <div class="event-card" id="evt-${e.id}" onclick="selectEvent('${e.id}')" style="animation-delay:${i*0.08}s">
        <div class="event-img">${imgHtml}</div>
        <div class="event-name">${e.name}</div>
        <div class="event-desc">${displayDesc}</div>
        <div class="event-info">
          <span class="event-badge">\u{1F4C5} ${e.date}</span>
          <span class="event-badge">\u23F0 ${e.time}</span>
          <span class="event-badge">\u{1F4CD} ${e.venue}</span>
        </div>
      </div>`;
  }).join('');
}

// -- 區域設定解析 --
function stripZoneConfig(desc) {
  // 移除 ｜區域：... 部分
  return desc.replace(/\uff5c\u5340\u57df\uff1a[^\n]*/g, '').trim();
}

function parseZoneConfig(desc) {
  // 搜尋 ｜區域：VIP前排/$900/剩8席,一般區/$500/剩45席,站票區/$300/剩60席
  const match = desc.match(/\uff5c\u5340\u57df\uff1a(.+)/);
  if (!match) return [];
  const parts = match[1].split(',');
  return parts.map(part => {
    const p = part.trim();
    // 格式: VIP前排/$900/剩8席
    const m = p.match(/^(.+?)\/\$(\d+)\/\u5269(\d+)\u5E2D$/);
    if (!m) return null;
    const name = m[1];
    const price = parseInt(m[2], 10);
    const remaining = parseInt(m[3], 10);
    return { name, price, remaining, raw: p };
  }).filter(Boolean);
}

function getRemainingClass(remaining) {
  if (remaining < 5)  return 'remaining-red';
  if (remaining <= 10) return 'remaining-orange';
  return 'remaining-green';
}

function renderZones() {
  const container = document.getElementById('zone-container');
  container.innerHTML = zones.map((z, i) => {
    const cls = getRemainingClass(z.remaining);
    return `
      <button class="zone-card" id="zone-${i}" onclick="selectZoneCard(${i})">
        <span class="zone-name">\u25A0 ${z.name}</span>
        <span class="zone-meta">
          <span class="zone-price">$${z.price}</span>
          <span class="zone-remaining ${cls}">\u5269 ${z.remaining} \u5E2D</span>
        </span>
      </button>`;
  }).join('');
}

async function selectZoneCard(index) {
  selectedZone = zones[index];
  if (!selectedZone) return;

  // 標記選中
  document.querySelectorAll('.zone-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('zone-' + index).classList.add('selected');

  // 重設後續狀態
  selectedTicket = null;
  qty = 1;
  document.getElementById('ticket-section').classList.add('hidden');
  document.getElementById('qty-section').classList.add('hidden');
  document.getElementById('order-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 有區域設定時：跳過票種選擇，靜默載入第一個票種（後端需要 ticket_type_id）
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getTicketTypes', event_id: selectedEvent.id })
    });
    const data = JSON.parse(await res.text());
    ticketTypes = data.ticketTypes || [];
    if (ticketTypes.length > 0) {
      selectedTicket = ticketTypes[0]; // 自動選第一個票種（後端用）
    }
  } catch (err) { /* ignore */ }

  // 直接顯示數量選擇（跳過票種選擇步驟）
  document.getElementById('qty-display').textContent = '1';
  document.getElementById('qty-hint').textContent = `MAX ${Math.min(selectedZone.remaining, 4)} TICKETS`;
  document.getElementById('qty-section').classList.remove('hidden');
  updateSummary();

  document.getElementById('qty-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// -- 選擇活動 --
async function selectEvent(id) {
  selectedEvent = events.find(e => String(e.id) === String(id));
  if (!selectedEvent) return;

  // 標記選中
  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('evt-' + id).classList.add('selected');

  // 重設狀態
  selectedTicket = null;
  selectedZone = null;
  zones = [];
  hasZoneConfig = false;
  qty = 1;
  document.getElementById('zone-section').classList.add('hidden');
  document.getElementById('ticket-section').classList.add('hidden');
  document.getElementById('qty-section').classList.add('hidden');
  document.getElementById('order-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 檢查是否有區域設定
  zones = parseZoneConfig(selectedEvent.description || '');
  hasZoneConfig = zones.length > 0;

  if (hasZoneConfig) {
    // 顯示區域選擇器
    const section = document.getElementById('zone-section');
    section.classList.remove('hidden');
    renderZones();
    section.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    // 無區域設定，直接載入票種
    loadTicketTypes(id);
  }
}

// -- 載入票種 --
async function loadTicketTypes(eventId) {
  const section = document.getElementById('ticket-section');
  const container = document.getElementById('ticket-types-container');
  section.classList.remove('hidden');
  container.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'getTicketTypes', event_id: eventId })
    });
    const text = await res.text();
    const data = JSON.parse(text);
    ticketTypes = data.ticketTypes || [];

    if (!ticketTypes.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:1rem;">此活動暫無可購票種</div>';
      return;
    }

    container.innerHTML = ticketTypes.map(t => `
      <button class="ticket-type-btn" id="tt-${t.id}" onclick="selectTicketType('${t.id}')">
        <span class="ticket-type-name">\u{1F3AB} ${t.name}</span>
        <span class="ticket-type-meta">
          <span class="ticket-type-price">$${t.price}</span>
          <span class="remaining-badge">\u5269 ${t.available} \u5F35</span>
        </span>
      </button>
    `).join('');
  } catch (err) {
    container.innerHTML = '<div style="text-align:center;color:var(--red);font-size:0.8rem;">載入票種失敗</div>';
  }

  section.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// -- 選擇票種 --
function selectTicketType(id) {
  selectedTicket = ticketTypes.find(t => String(t.id) === String(id));
  if (!selectedTicket) return;

  // 標記選中
  document.querySelectorAll('.ticket-type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('tt-' + id).classList.add('selected');

  // 重設數量
  qty = 1;
  document.getElementById('qty-display').textContent = qty;
  document.getElementById('qty-hint').textContent = `MAX ${Math.min(selectedTicket.available, 4)} TICKETS`;

  // 顯示數量選擇
  document.getElementById('qty-section').classList.remove('hidden');
  updateSummary();

  document.getElementById('qty-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function changeQty(delta) {
  const maxAvail = (hasZoneConfig && selectedZone) ? selectedZone.remaining : (selectedTicket ? selectedTicket.available : 0);
  if (maxAvail === 0) return;
  const maxQty = Math.min(maxAvail, 4);
  const newQty = qty + delta;
  if (newQty < 1 || newQty > maxQty) return;
  qty = newQty;
  document.getElementById('qty-display').textContent = qty;
  updateSummary();
}

function updateSummary() {
  if (!selectedEvent) return;

  // 有區域時用區域價格，無區域時用票種價格
  const useZone = hasZoneConfig && selectedZone;
  const unitPrice = useZone ? selectedZone.price : (selectedTicket ? selectedTicket.price : 0);
  const ticketLabel = useZone ? selectedZone.name : (selectedTicket ? selectedTicket.name : '');

  document.getElementById('sum-event').textContent = selectedEvent.name;
  document.getElementById('sum-ticket').textContent = ticketLabel;
  document.getElementById('sum-price').textContent = '$' + unitPrice;
  document.getElementById('sum-qty').textContent = qty + ' 張';
  document.getElementById('sum-total').textContent = '$' + (unitPrice * qty);

  // 區域資訊
  if (useZone) {
    document.getElementById('sum-zone-row').style.display = 'flex';
    document.getElementById('sum-zone').textContent = selectedZone.name;
  } else {
    document.getElementById('sum-zone-row').style.display = 'none';
  }

  document.getElementById('order-summary').classList.remove('hidden');
  document.getElementById('verify-section').classList.remove('hidden');

  if (emailVerified) {
    document.getElementById('form-section').classList.remove('hidden');
  }
}

// -- Email 驗證 --
async function sendCode() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('請輸入 Email'); return; }

  const btn = document.getElementById('send-code-btn');
  btn.disabled = true;
  btn.textContent = '發送中\u2026';
  hideError();

  try {
    const checkRes = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'checkMember', email })
    });
    const checkData = JSON.parse(await checkRes.text());

    if (checkData.blocked) { showError('此 Email 已被停用，請聯繫主辦單位'); btn.disabled = false; btn.textContent = '發送驗證碼'; return; }
    if (checkData.hasActiveOrder) { showError('您有未完成的訂單，請先完成付款後再購票'); btn.disabled = false; btn.textContent = '發送驗證碼'; return; }

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'sendVerifyCode', email })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('code-row').classList.remove('hidden');
      document.getElementById('verify-status').textContent = '驗證碼已寄出，請查看信箱';
      document.getElementById('verify-status').style.color = 'var(--green)';
      let sec = 60;
      btn.textContent = `${sec}s`;
      const timer = setInterval(() => {
        sec--;
        btn.textContent = `${sec}s`;
        if (sec <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '重新發送'; }
      }, 1000);
    } else {
      showError(data.error || '發送失敗');
      btn.disabled = false;
      btn.textContent = '發送驗證碼';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '發送驗證碼';
  }
}

async function verifyEmail() {
  const email = document.getElementById('email').value.trim();
  const code  = document.getElementById('verify-code').value.trim();
  if (!code) { showError('請輸入驗證碼'); return; }

  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.textContent = '驗證中\u2026';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'verifyCode', email, code })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      emailVerified = true;
      verifiedEmail = email;
      sessionToken = data.sessionToken || '';
      showVerified();
    } else {
      showError(data.error || '驗證失敗');
      btn.disabled = false;
      btn.textContent = '驗證';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '驗證';
  }
}

function showVerified() {
  document.getElementById('verify-status').textContent = '\u2705 驗證成功';
  document.getElementById('verify-status').style.color = 'var(--green)';
  document.getElementById('email').disabled = true;
  document.getElementById('verify-code').disabled = true;
  document.getElementById('verify-btn').disabled = true;
  document.getElementById('verify-btn').textContent = '已驗證';
  document.getElementById('send-code-btn').classList.add('hidden');
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('form-section').classList.remove('hidden');
}

// -- 送出訂單 --
async function submitOrder() {
  const name  = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  let   note  = document.getElementById('note').value.trim();

  hideError();
  if (!name)  { showError('請輸入姓名'); return; }
  if (!phone) { showError('請輸入電話'); return; }
  const phoneClean = phone.replace(/[-\s]/g, '');
  if (!/^09\d{8}$/.test(phoneClean)) { showError('請輸入有效的手機號碼（09 開頭，共 10 碼）'); return; }
  if (!selectedEvent || !selectedTicket) { showError('請選擇活動和票種'); return; }

  // 區域資訊寫入備註
  if (hasZoneConfig && selectedZone) {
    const zoneNote = `\u3010\u5340\u57df\u3011${selectedZone.name}`;
    note = note ? `${zoneNote}\n${note}` : zoneNote;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'LOADING\u2026';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'submitTicketOrder',
        email: verifiedEmail,
        sessionToken,
        name,
        phone,
        event_id: String(selectedEvent.id),
        ticket_type_id: String(selectedTicket.id),
        qty,
        note
      })
    });
    const data = JSON.parse(await res.text());

    if (data.success) {
      document.getElementById('shop-view').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      document.getElementById('success-id').textContent = '訂單編號：' + data.orderId;
      document.getElementById('checkin-code').textContent = data.checkinCode;

      // 顯示區域資訊
      if (hasZoneConfig && selectedZone) {
        const zoneDisplay = document.getElementById('success-zone-display');
        zoneDisplay.textContent = '\u2593 YOUR ZONE: ' + selectedZone.name + ' \u2593';
        zoneDisplay.classList.remove('hidden');
      }
    } else {
      showError(data.error || '購票失敗');
      btn.disabled = false;
      btn.textContent = '\u{1F579}\uFE0F INSERT COIN';
    }
  } catch (err) {
    showError('API 連線失敗');
    btn.disabled = false;
    btn.textContent = '\u{1F579}\uFE0F INSERT COIN';
  }
}

// -- 重置 --
function resetPage() {
  selectedEvent = null;
  selectedTicket = null;
  selectedZone = null;
  zones = [];
  hasZoneConfig = false;
  ticketTypes = [];
  qty = 1;
  emailVerified = false;
  verifiedEmail = '';
  sessionToken = '';

  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('shop-view').style.display = 'block';

  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('zone-section').classList.add('hidden');
  document.getElementById('ticket-section').classList.add('hidden');
  document.getElementById('qty-section').classList.add('hidden');
  document.getElementById('order-summary').classList.add('hidden');
  document.getElementById('verify-section').classList.add('hidden');
  document.getElementById('form-section').classList.add('hidden');

  // 重建驗證區
  document.getElementById('email').disabled = false;
  document.getElementById('email').value = '';
  document.getElementById('verify-code').disabled = false;
  document.getElementById('verify-code').value = '';
  document.getElementById('send-code-btn').classList.remove('hidden');
  document.getElementById('send-code-btn').disabled = false;
  document.getElementById('send-code-btn').textContent = '發送驗證碼';
  document.getElementById('verify-btn').disabled = false;
  document.getElementById('verify-btn').textContent = '驗證';
  document.getElementById('code-row').classList.add('hidden');
  document.getElementById('verify-status').textContent = '';

  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('note').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '\u{1F579}\uFE0F INSERT COIN';
  document.getElementById('qty-display').textContent = '1';

  // 重置成功畫面的區域顯示
  document.getElementById('success-zone-display').classList.add('hidden');

  hideError();
  loadEvents();
}

// -- 工具 --
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-msg').classList.add('hidden');
}

// -- 啟動 --
loadEvents();
</script>

</html>
