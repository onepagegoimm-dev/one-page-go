<style>
  /* ── 色票：暖心手作風 ── */
  :root {
    --cream:   #faf3ea;
    --warm:    #f0dcc8;
    --peach:   #f5c8a8;
    --rose:    #e09580;
    --terra:   #c47a62;
    --brown:   #6b4332;
    --text:    #3e2a1e;
    --muted:   #9a7e6f;
    --white:   #fffaf5;
    --shadow:  rgba(107,67,50,0.1);

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Noto Serif TC', serif;
    color: var(--text);
    min-height: 100vh;

  /* ── 手作紙質紋理背景 ── */

    background-image:

        0deg,
        transparent, transparent 24px,
        rgba(212,184,156,0.08) 24px, rgba(212,184,156,0.08) 25px
      ),
      repeating-linear-gradient(
        90deg,
        transparent, transparent 24px,
        rgba(212,184,156,0.05) 24px, rgba(212,184,156,0.05) 25px
      );
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 2.5rem 1.5rem 1.5rem;
    background: linear-gradient(180deg, rgba(240,220,200,0.5) 0%, transparent 100%);
  }

  .logo-wrap {
    display: inline-flex; flex-direction: column; align-items: center; gap: 0.4rem;
  }

  .logo-icon { font-size: 2.5rem; line-height: 1; animation: float 3s ease-in-out infinite; }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-5px) rotate(-2deg); }
  }

  .logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 500;
    color: var(--brown);
    letter-spacing: 0.04em;
  }

  .logo-sub {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── 裝飾線（縫線風格） ── */
  .deco-line {
    display: flex; align-items: center; gap: 0.8rem;
    max-width: 260px; margin: 1rem auto 0;
  }
  .deco-line span { flex: 1; height: 0; border-top: 2px dashed var(--stitch); }
  .deco-line em { font-style: normal; font-size: 0.75rem; color: var(--rose); }

  /* ── 主內容 ── */
  main { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 1.5rem; }

  /* ── Section 標題 ── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--brown);
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.6rem;
  }
  .section-title::after { content: ''; flex: 1; height: 0; border-top: 2px dashed var(--stitch); }

  /* ── 商品卡 ── */
  .products-grid { display: flex; flex-direction: column; gap: 1rem; }

  .product-card {
    background: var(--white);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 3px 14px var(--shadow);
    border: 2px dashed rgba(212,184,156,0.5);
    display: flex;
    transition: transform 0.2s, border-color 0.3s;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .product-card:hover { transform: translateY(-2px); border-color: var(--peach); }

  .product-img {
    width: 110px; min-height: 110px;
    background: linear-gradient(135deg, var(--warm), var(--peach));
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem;
    flex-shrink: 0;
    overflow: hidden;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }

  .product-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.3rem; }

  .product-name { font-weight: 600; font-size: 1rem; color: var(--brown); }
  .product-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .product-price { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--terra); margin-top: auto; }

  /* 數量控制 */
  .qty-control {
    display: flex; align-items: center; gap: 0.6rem; margin-top: 0.5rem;
  }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 8px;
    border: 2px dashed var(--stitch);
    background: var(--cream); color: var(--brown);

    display: flex; align-items: center; justify-content: center;

    font-family: 'Playfair Display', serif;

    border-radius: 18px;
    padding: 1.5rem;
    box-shadow: 0 3px 14px var(--shadow);

    letter-spacing: 0.08em;

  }

  .form-input, .form-textarea {
    background: var(--cream);
    border: 1.5px solid var(--stitch);

  /* ── Email 驗證區 ── */
  .verify-section {
    background: var(--white);
    border-radius: 18px;

  .verify-row {

  .verify-btn {
    padding: 0.7rem 1rem;
    background: var(--rose);
    color: var(--white);
    border: none;
    border-radius: 100px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;

  .verified-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;

    font-size: 0.85rem; color: var(--green);

  .info-msg {
    background: #fdf3e7; border: 1.5px dashed var(--stitch);

    font-size: 0.82rem; color: var(--muted); text-align: center;
    margin-top: 0.5rem;

  /* ── 送出按鈕（膠囊型） ── */

    width: 100%;
    padding: 1rem;
    background: var(--rose);
    color: var(--white);
    border: none;
    border-radius: 100px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(224,149,128,0.3);
    transition: transform 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;

  .submit-btn:hover:not(:disabled) { transform: translateY(-1px); background: var(--terra); }

  /* ── 成功畫面 ── */

  @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--brown); margin-bottom: 0.5rem; }
  .success-msg { font-size: 0.9rem; color: var(--muted); line-height: 1.7; }
  .order-id-badge {
    display: inline-block; margin-top: 1.2rem;
    background: var(--cream); border: 2px dashed var(--stitch);
    border-radius: 100px; padding: 0.5rem 1.5rem;
    font-size: 0.82rem; color: var(--terra); letter-spacing: 0.08em;

  .new-order-btn {

  .new-order-btn:hover { background: var(--rose); color: white; border-style: solid; }

  /* ── 載入中 ── */
  .loading-wrap {
    text-align: center; padding: 3rem;

  .spinner {

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 錯誤 */
  .error-msg {
    background: #fff0f0; border: 1.5px dashed #e8a0a0;

  footer {

    .logo-name { font-size: 1.9rem; }

</style>

<script>
// ── 設定你的 Apps Script 網址 ──────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbxQWWF38lw7KPXn658C43fREy-hdKNAb3r_xaqPEDRADP9an0pipbDFcHVp8bUl2bkE/exec";


// ── 資料 ─────────────────────────────────────────────
let products = [];
let cart     = {};
let emailVerified = false;
let verifiedEmail = "";

// ── Session Token ──
function getSessionToken() { return sessionStorage.getItem('opg_session_token') || ''; }
function saveSessionToken(t) { sessionStorage.setItem('opg_session_token', t); }

// ── 初始化 ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setMinDate();
  loadProducts();
});

function setMinDate() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-date').min = today;
}

// ── 載入商品 ──────────────────────────────────────────
async function loadProducts() {
  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getProducts' })
    });
    const data = await res.json();
    products = data.products || [];
    renderProducts();
  } catch(e) {
    document.getElementById('products-container').innerHTML =
      `<div class="error-msg">無法載入商品，請稍後再試</div>`;
  }
}

function renderProducts() {
  const container = document.getElementById('products-container');
  if (!products.length) {
    container.innerHTML = `<div class="loading-wrap">目前暫無商品，請稍後再來</div>`;
    return;
  }

  // 根據產品名稱關鍵字匹配 emoji
  const EMOJI_MAP = [
    { keywords: ["可頌", "croissant"], emoji: "🥐" },
    { keywords: ["布朗尼", "巧克力", "brownie", "chocolate"], emoji: "🍫" },
    { keywords: ["水果塔", "塔", "tart"], emoji: "🍰" },
    { keywords: ["蛋糕", "cake", "戚風"], emoji: "🎂" },
    { keywords: ["杯子蛋糕", "cupcake", "瑪芬", "muffin"], emoji: "🧁" },
    { keywords: ["甜甜圈", "donut"], emoji: "🍩" },
    { keywords: ["派", "pie", "批"], emoji: "🥧" },
    { keywords: ["餅乾", "cookie", "曲奇"], emoji: "🍪" },
    { keywords: ["麵包", "吐司", "bread", "toast"], emoji: "🍞" },
    { keywords: ["鬆餅", "waffle", "pancake"], emoji: "🧇" },
  ];
  const FALLBACK_EMOJI = ["🧁","🍰","🥐","🍞","🎂","🍩","🥧","🍪"];

  function getProductEmoji(name, index) {
    const lower = name.toLowerCase();
    for (const entry of EMOJI_MAP) {
      if (entry.keywords.some(k => lower.includes(k))) return entry.emoji;
    }
    return FALLBACK_EMOJI[index % FALLBACK_EMOJI.length];
  }

  container.innerHTML = `<div class="products-grid">${
    products.map((p, i) => {
      const emoji = getProductEmoji(p.name, i);
      const imgHtml = p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}" />`
        : emoji;
      return `
        <div class="product-card" style="animation-delay:${i*0.08}s">
          <div class="product-img">${imgHtml}</div>
          <div class="product-body">
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.description || ''}</div>
            <div class="product-price">$${p.price}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
              <span class="qty-num" id="qty-${p.id}">0</span>
              <button class="qty-btn" onclick="changeQty('${p.id}', 1)">＋</button>
            </div>
          </div>
        </div>`;
    }).join('')
  }</div>`;
}

// ── 購物車操作 ────────────────────────────────────────
function changeQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  document.getElementById(`qty-${id}`).textContent = cart[id];
  updateCart();
}

function updateCart() {
  const items = getCartItems();
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);

  const summary  = document.getElementById('cart-summary');
  const formSec  = document.getElementById('form-section');
  const itemList = document.getElementById('cart-items-list');

  if (items.length === 0) {
    summary.classList.remove('show');
    formSec.style.display = 'none';
    return;
  }

  document.getElementById('cart-count-badge').textContent = `${items.length} 項商品`;
  itemList.innerHTML = items.map(i => `
    <div class="cart-item">
      <span class="cart-item-name">${i.name} × ${i.qty}</span>
      <span>$${i.price * i.qty}</span>
    </div>`).join('');
  document.getElementById('cart-total-num').textContent = total;

  summary.classList.add('show');
  formSec.style.display = 'block';
}

function getCartItems() {
  return products
    .filter(p => cart[p.id] > 0)
    .map(p => ({ ...p, qty: cart[p.id] }));
}

// ── Email 格式驗證 ────────────────────────────────────
function isValidEmail(email) {
  // 標準 Email 格式：xxx@xxx.xx
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
}

// ── Email 驗證 ───────────────────────────────────────
async function sendCode() {
  const email = document.getElementById('f-email').value.trim();
  const statusEl = document.getElementById('verify-status');
  const btn = document.getElementById('send-code-btn');

  if (!email) {
    statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">請輸入 Email</div>`;
    return;
  }
  if (!isValidEmail(email)) {
    statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">Email 格式不正確，請確認格式（例如：name@example.com）</div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = '發送中…';
  statusEl.innerHTML = '';

  try {
    // 先檢查會員狀態
    const checkRes = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'checkMember', email })
    });
    const checkData = await checkRes.json();

    if (checkData.blocked) {
      statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">此 Email 已被停用，請聯繫店家</div>`;
      btn.disabled = false;
      btn.textContent = '發送驗證碼';
      return;
    }

    if (checkData.hasActiveOrder) {
      statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">您有未完成的訂單，結單後才能再次訂購</div>`;
      btn.disabled = false;
      btn.textContent = '發送驗證碼';
      return;
    }

    if (checkData.exists && checkData.verified) {
      // 已驗證過，但仍需驗證碼以取得 session token
      // 繼續往下走發送驗證碼流程
    }

    // 發送驗證碼
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'sendVerifyCode', email })
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById('code-section').style.display = 'block';
      statusEl.innerHTML = `<div class="info-msg">驗證碼已寄到 ${email}，請查收信箱（含垃圾郵件）</div>`;
      // 60 秒冷卻
      let cd = 60;
      btn.textContent = `${cd}s`;
      const timer = setInterval(() => {
        cd--;
        btn.textContent = `${cd}s`;
        if (cd <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = '重新發送';
        }
      }, 1000);
    } else {
      statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">${data.error || '發送失敗'}</div>`;
      btn.disabled = false;
      btn.textContent = '發送驗證碼';
    }
  } catch(e) {
    statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">網路錯誤，請稍後再試</div>`;
    btn.disabled = false;
    btn.textContent = '發送驗證碼';
  }
}

async function verifyEmail() {
  const email = document.getElementById('f-email').value.trim();
  const code  = document.getElementById('f-code').value.trim();
  const statusEl = document.getElementById('verify-status');
  const btn = document.getElementById('verify-btn');

  if (!code || code.length !== 6) {
    statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">請輸入 6 位數驗證碼</div>`;
    return;
  }

  btn.disabled = true;
  btn.textContent = '驗證中…';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'verifyCode', email, code })
    });
    const data = await res.json();

    if (data.success && data.verified) {
      emailVerified = true;
      verifiedEmail = email;
      if (data.sessionToken) saveSessionToken(data.sessionToken);
      showVerified();
    } else {
      statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">${data.error || '驗證失敗'}</div>`;
      btn.disabled = false;
      btn.textContent = '驗證';
    }
  } catch(e) {
    statusEl.innerHTML = `<div class="error-msg" style="margin-top:0.5rem">網路錯誤，請稍後再試</div>`;
    btn.disabled = false;
    btn.textContent = '驗證';
  }
}

function showVerified() {
  const section = document.getElementById('verify-section');
  section.innerHTML = `
    <div class="verified-badge">✅ 已驗證：${verifiedEmail}</div>
  `;
  document.getElementById('order-form').style.display = 'flex';
}

// ── 送出訂單 ──────────────────────────────────────────
async function submitOrder() {
  const name       = document.getElementById('f-name').value.trim();
  const phone      = document.getElementById('f-phone').value.trim();
  const pickupDate = document.getElementById('f-date').value;
  const note       = document.getElementById('f-note').value.trim();
  const errorEl    = document.getElementById('form-error');
  const btn        = document.getElementById('submit-btn');

  errorEl.style.display = 'none';

  if (!emailVerified) { showError('請先完成 Email 驗證'); return; }
  if (!name)          { showError('請填寫姓名'); return; }
  if (name.length < 2){ showError('姓名至少 2 個字'); return; }
  if (!phone)         { showError('請填寫電話'); return; }
  if (!/^09\d{8}$/.test(phone.replace(/[-\s]/g, ''))) { showError('請輸入有效的手機號碼（09 開頭）'); return; }
  if (!pickupDate)    { showError('請選擇取貨日期'); return; }

  const items = getCartItems();
  if (!items.length) { showError('購物車是空的喔！'); return; }

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;border-width:2px;margin:0"></span>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submitOrder',
        sessionToken: getSessionToken(),
        email: verifiedEmail,
        customerName: name,
        phone: phone.replace(/[-\s]/g, ''),
        pickupDate, note, items, total
      })
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById('shop-view').style.display = 'none';
      const s = document.getElementById('success-screen');
      s.classList.add('show');
      document.getElementById('success-order-id').textContent = `訂單編號：${data.orderId}`;
    } else {
      showError(data.error || '送出失敗');
      btn.disabled = false;
      btn.innerHTML = '<span>🎁</span><span>確認送出訂單</span>';
    }
  } catch(e) {
    showError('送出失敗，請稍後再試');
    btn.disabled = false;
    btn.innerHTML = '<span>🎁</span><span>確認送出訂單</span>';
  }
}

function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function resetPage() {
  cart = {};
  emailVerified = false;
  verifiedEmail = "";
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('shop-view').style.display = 'block';
  document.getElementById('order-form').style.display = 'none';
  document.getElementById('form-error').style.display = 'none';

  // 重建驗證區
  const vs = document.getElementById('verify-section');
  vs.innerHTML = `
    <div class="form-group">
      <label class="form-label">Email *</label>
      <div class="verify-row">
        <div class="form-group">
          <input class="form-input" id="f-email" type="email" placeholder="your@email.com" />
        </div>
        <button class="verify-btn" id="send-code-btn" onclick="sendCode()">發送驗證碼</button>
      </div>
    </div>
    <div id="code-section" style="display:none; margin-top:0.8rem;">
      <div class="form-group">
        <label class="form-label">驗證碼</label>
        <div class="verify-row">
          <div class="form-group">
            <input class="form-input" id="f-code" type="text" placeholder="輸入 6 位數驗證碼" maxlength="6" />
          </div>
          <button class="verify-btn" id="verify-btn" onclick="verifyEmail()">驗證</button>
        </div>
      </div>
    </div>
    <div id="verify-status"></div>
  `;

  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-note').value = '';
  renderProducts();
  updateCart();
  window.scrollTo(0,0);
}
</script>
